{% extends 'base.html' %}
{% block content %}
<div class="hero-card p-4 p-md-5 shadow-lg">
  <div class="row align-items-center g-4">
    <div class="col-lg-8">
      <div class="badge text-bg-light mb-3">{{ app_name }}</div>
      <h1 class="display-5 fw-bold mb-3">{{ settings.school_name }}</h1>
      <p class="lead text-muted mb-4">{{ settings.motto or app_tagline }}</p>
      <div class="d-flex flex-wrap gap-2">
        <a class="btn btn-primary btn-lg" href="{{ url_for('auth.login') }}">Login</a>
        <a class="btn btn-outline-secondary btn-lg" href="{{ url_for('main.health') }}">Health Check</a>
      </div>
    </div>
    <div class="col-lg-4">
      <div class="mini-panel p-4">
        <div><strong>Dashboard</strong><br><span class="text-muted">Analytics for management</span></div>
        <div class="mt-3"><strong>Reports</strong><br><span class="text-muted">PDF export and verification</span></div>
        <div class="mt-3"><strong>Security</strong><br><span class="text-muted">CSRF, rate limiting, audit logs</span></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
