{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <div class="badge text-bg-{{ 'success' if report.status == 'published' else 'warning' }}">{{ report.status }}</div>
        <h3 class="mt-3">{{ student.first_name }} {{ student.last_name }}</h3>
        <p class="text-muted">{{ student.school_class.name }} · {{ term }} · {{ academic_year }}</p>
        <p><strong>Average:</strong> {{ average }} · <strong>Grade:</strong> {{ grade }}</p>
        <p><strong>Verification token:</strong> <code>{{ report.verification_token }}</code></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
