{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Students</h3>
  <a class="btn btn-primary" href="{{ url_for('admin.student_create') }}">Add Student</a>
</div>
<table class="table table-striped">
  <thead><tr><th>Adm No.</th><th>Name</th><th>Class</th><th>Guardian</th></tr></thead>
  <tbody>
    {% for s in students %}
    <tr>
      <td>{{ s.admission_number }}</td>
      <td>{{ s.first_name }} {{ s.last_name }}</td>
      <td>{{ s.school_class.name }}</td>
      <td>{{ s.guardian_name or '' }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
