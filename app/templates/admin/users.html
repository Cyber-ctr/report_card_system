{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Users</h3>
  <a class="btn btn-primary" href="{{ url_for('admin.user_create') }}">Add User</a>
</div>
<table class="table table-striped">
  <thead><tr><th>Username</th><th>Email</th><th>Role</th><th>Status</th></tr></thead>
  <tbody>
    {% for u in users %}
    <tr><td>{{ u.username }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td><td>{{ 'Active' if u.is_active_account else 'Inactive' }}</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
