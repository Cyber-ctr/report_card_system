{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h3 class="mb-1">Classes</h3>
    <p class="text-muted mb-0">Secondary school class structure.</p>
  </div>
  <a class="btn btn-primary" href="{{ url_for('admin.class_create') }}">Add Class</a>
</div>
<div class="row g-3">
  {% for c in classes %}
  <div class="col-md-4">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body">
        <h5 class="card-title">{{ c.name }}</h5>
        <p class="text-muted mb-1">{{ c.stream or 'General stream' }}</p>
        <span class="badge text-bg-light">Order {{ c.order_index }}</span>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
